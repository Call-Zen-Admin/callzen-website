
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Serif+4:ital,wght@0,300;0,400;1,300&family=Barlow:wght@400;500;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body, .wrap { font-family: 'Barlow', sans-serif; }

  .wrap {
    max-width: 860px;
    margin: 0 auto;
    padding: 2rem 1.5rem 3rem;
  }

  .masthead {
    border-bottom: 3px double var(--color-border-primary);
    padding-bottom: 1rem;
    margin-bottom: 0.4rem;
    text-align: center;
  }

  .masthead-date {
    font-family: 'Barlow', sans-serif;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--color-text-tertiary);
    margin-bottom: 0.5rem;
  }

  .masthead h1 {
    font-family: 'Playfair Display', serif;
    font-size: 3rem;
    font-weight: 700;
    color: var(--color-text-primary);
    line-height: 1;
    letter-spacing: -0.01em;
  }

  .masthead-sub {
    font-family: 'Source Serif 4', serif;
    font-size: 13px;
    font-style: italic;
    color: var(--color-text-secondary);
    margin-top: 0.4rem;
  }

  .edition-bar {
    display: flex;
    justify-content: center;
    gap: 2rem;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--color-text-tertiary);
    padding: 0.5rem 0 1rem;
    border-bottom: 0.5px solid var(--color-border-tertiary);
    margin-bottom: 2rem;
  }

  .section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--color-text-tertiary);
    padding: 0 0 0.5rem;
    border-bottom: 0.5px solid var(--color-border-secondary);
    margin-bottom: 1.25rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .section-label .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;
  }

  .dot-intl { background: #378ADD; }
  .dot-aus  { background: #1D9E75; }
  .dot-ind  { background: #D85A30; }

  .section { margin-bottom: 2.5rem; }

  .news-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 1.25rem;
  }

  .news-card {
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-lg);
    padding: 1.1rem 1.25rem;
    transition: border-color 0.2s;
  }

  .news-card:hover { border-color: var(--color-border-secondary); }

  .card-meta {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--color-text-tertiary);
    margin-bottom: 0.4rem;
  }

  .card-headline {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--color-text-primary);
    line-height: 1.3;
    margin-bottom: 0.55rem;
  }

  .card-body {
    font-family: 'Source Serif 4', serif;
    font-size: 14px;
    line-height: 1.7;
    color: var(--color-text-secondary);
    font-weight: 300;
  }

  .india-grid {
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  }

  .loading-state {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--color-text-secondary);
  }

  .spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--color-border-tertiary);
    border-top-color: var(--color-text-secondary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 1rem;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-label {
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .error-state {
    text-align: center;
    padding: 2rem;
    color: var(--color-text-danger);
    font-size: 14px;
  }

  .refresh-btn {
    display: block;
    margin: 1.5rem auto 0;
    padding: 0.5rem 1.5rem;
    font-family: 'Barlow', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    border: 0.5px solid var(--color-border-secondary);
    border-radius: var(--border-radius-md);
    background: transparent;
    color: var(--color-text-secondary);
  }

  .refresh-btn:hover { background: var(--color-background-secondary); }

  .news-content { display: none; }
  .news-content.ready { display: block; }
</style>

<div class="wrap">
  <div class="masthead">
    <div class="masthead-date" id="today-date"></div>
    <h1>The Daily Brief</h1>
    <div class="masthead-sub">World · Australia · India — curated fresh, every visit</div>
  </div>
  <div class="edition-bar">
    <span>World</span><span>Australia</span><span>India</span>
  </div>

  <div class="loading-state" id="loading">
    <div class="spinner"></div>
    <div class="loading-label">Fetching today's headlines…</div>
  </div>

  <div class="error-state" id="error" style="display:none"></div>

  <div class="news-content" id="news-content">
    <div class="section">
      <div class="section-label"><span class="dot dot-intl"></span>International</div>
      <div class="news-grid" id="intl-grid"></div>
    </div>
    <div class="section">
      <div class="section-label"><span class="dot dot-aus"></span>Australia</div>
      <div class="news-grid" id="aus-grid"></div>
    </div>
    <div class="section">
      <div class="section-label"><span class="dot dot-ind"></span>India</div>
      <div class="news-grid india-grid" id="ind-grid"></div>
    </div>
  </div>

  <button class="refresh-btn" id="refresh-btn" style="display:none" onclick="fetchNews()">↺ Refresh headlines</button>
</div>

<script>
  const today = new Date();
  document.getElementById('today-date').textContent = today.toLocaleDateString('en-AU', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

  function renderCard(item) {
    return `<div class="news-card">
      <div class="card-meta">${item.topic || ''}</div>
      <div class="card-headline">${item.headline}</div>
      <div class="card-body">${item.summary}</div>
    </div>`;
  }

  function populateSection(id, items) {
    document.getElementById(id).innerHTML = items.map(renderCard).join('');
  }

  async function fetchNews() {
    document.getElementById('loading').style.display = 'block';
    document.getElementById('news-content').classList.remove('ready');
    document.getElementById('error').style.display = 'none';
    document.getElementById('refresh-btn').style.display = 'none';

    const dateStr = today.toLocaleDateString('en-AU', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    const prompt = `Today is ${dateStr}. Search the web and find the 10 most important, CURRENT, real news stories from right now — not old or generic stories.

Return ONLY a JSON object, no markdown, no backticks, no preamble. Format:
{
  "international": [
    {"headline": "...", "summary": "2-3 sentence factual summary of the actual news story.", "topic": "e.g. Geopolitics / Economy / Climate"},
    {"headline": "...", "summary": "...", "topic": "..."},
    {"headline": "...", "summary": "...", "topic": "..."}
  ],
  "australia": [
    {"headline": "...", "summary": "...", "topic": "..."},
    {"headline": "...", "summary": "...", "topic": "..."},
    {"headline": "...", "summary": "...", "topic": "..."}
  ],
  "india": [
    {"headline": "...", "summary": "...", "topic": "..."},
    {"headline": "...", "summary": "...", "topic": "..."},
    {"headline": "...", "summary": "...", "topic": "..."},
    {"headline": "...", "summary": "...", "topic": "..."}
  ]
}

Use web search to find actual breaking news. Each summary must be 2-3 sentences describing the real event. Do not make anything up.`;

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          tools: [{ type: 'web_search_20250305', name: 'web_search' }],
          messages: [{ role: 'user', content: prompt }]
        })
      });

      const data = await res.json();

      const textBlocks = (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('');
      const clean = textBlocks.replace(/```json|```/g, '').trim();
      const start = clean.indexOf('{');
      const end = clean.lastIndexOf('}');
      const jsonStr = clean.slice(start, end + 1);
      const parsed = JSON.parse(jsonStr);

      populateSection('intl-grid', parsed.international);
      populateSection('aus-grid', parsed.australia);
      populateSection('ind-grid', parsed.india);

      document.getElementById('loading').style.display = 'none';
      document.getElementById('news-content').classList.add('ready');
      document.getElementById('refresh-btn').style.display = 'block';

    } catch (e) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display = 'block';
      document.getElementById('error').textContent = 'Could not load headlines. Please try again.';
      document.getElementById('refresh-btn').style.display = 'block';
    }
  }

  fetchNews();
</script>
