permissions:
  contents: write
  
name: Generate News JSON

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sanity check files
        run: |
          ls -l
          cat requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify requests installed
        run: |
          python - <<EOF
          import requests
          print("requests OK:", requests.__version__)
          EOF

      - name: Run script
        run: python generate_news.py
