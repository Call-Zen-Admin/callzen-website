<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Daily Brief — YouTube</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}

:root{
  --bg:#0c0e14;
  --surface:#13161f;
  --surface2:#1b1f2d;
  --border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.14);
  --text:#e8eaf0;
  --muted:#7c8399;
  --faint:#3d4360;
  --yt:#ff4444;
  --radius:14px;
  --radius-sm:8px;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  font-size:15px;
  line-height:1.6;
  min-height:100vh;
}

body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 70% 50% at 10% -10%, rgba(255,68,68,0.04) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 90% 110%, rgba(255,68,68,0.03) 0%, transparent 60%);
  pointer-events:none;z-index:0;
}

.wrap{max-width:1200px;margin:0 auto;padding:0 2rem 5rem;position:relative;z-index:1;}

/* ── HEADER ── */
header{
  padding:2.5rem 0 2rem;
  margin-bottom:2.5rem;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;
}

.brand-name{
  font-family:'DM Serif Display',serif;
  font-size:clamp(1.8rem,3vw,2.6rem);
  font-weight:400;letter-spacing:-0.02em;line-height:1;
}

.brand-name em{
  font-style:italic;
  background:linear-gradient(135deg,#ff4444,#ff8c00);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

.brand-sub{font-size:13px;color:var(--muted);margin-top:0.3rem;}

.header-right{display:flex;flex-direction:column;align-items:flex-end;gap:0.5rem;}

.date-badge{
  font-family:'DM Mono',monospace;font-size:11px;font-weight:500;
  letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);
  background:var(--surface);border:1px solid var(--border);
  padding:5px 12px;border-radius:20px;
}

.btn-refresh{
  font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;
  letter-spacing:0.07em;text-transform:uppercase;
  padding:6px 14px;background:transparent;color:var(--muted);
  border:1px solid var(--border2);border-radius:var(--radius-sm);
  cursor:pointer;transition:border-color 0.15s,color 0.15s;
}
.btn-refresh:hover{border-color:var(--yt);color:var(--text);}

/* ── CHANNEL BLOCK ── */
.channel-block{
  margin-bottom:2.5rem;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  overflow:hidden;
  animation:fadeUp 0.4s ease both;
}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.channel-hd{
  display:flex;align-items:center;gap:10px;
  padding:0.85rem 1.2rem;
  border-bottom:1px solid var(--border);
  background:var(--surface2);
}

.yt-icon svg{width:16px;height:16px;fill:var(--yt);display:block;}

.channel-name{
  font-family:'DM Mono',monospace;font-size:11px;font-weight:600;
  letter-spacing:0.1em;text-transform:uppercase;
  color:var(--yt);text-decoration:none;
}
.channel-name:hover{text-decoration:underline;}

.channel-count{
  margin-left:auto;
  font-family:'DM Mono',monospace;font-size:10px;
  color:var(--faint);letter-spacing:0.08em;
}

/* ── VIDEO GRID ── */
.videos-row{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  border-top:none;
}

@media(max-width:960px){.videos-row{grid-template-columns:repeat(3,1fr);}}
@media(max-width:560px){.videos-row{grid-template-columns:repeat(2,1fr);}}

.video-card{
  position:relative;
  border-right:1px solid var(--border);
  cursor:pointer;
  background:var(--bg);
}
.video-card:last-child{border-right:none;}
.video-card:hover .thumb-img{opacity:0.8;}
.video-card:hover .play-overlay{opacity:1;}

/* thumbnail */
.thumb-wrap{
  position:relative;
  padding-bottom:56.25%;
  height:0;
  background:#0a0a0a;
  overflow:hidden;
}

.thumb-img{
  position:absolute;top:0;left:0;
  width:100%;height:100%;
  object-fit:cover;display:block;
  transition:opacity 0.2s;
}

.play-overlay{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:44px;height:44px;
  background:rgba(255,68,68,0.9);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity 0.2s;
  pointer-events:none;
}
.play-overlay svg{width:18px;height:18px;fill:#fff;margin-left:2px;}

/* iframe replaces thumbnail on click */
.thumb-wrap iframe{
  position:absolute;top:0;left:0;
  width:100%;height:100%;
  border:none;display:none;
}
.thumb-wrap.playing .thumb-img,
.thumb-wrap.playing .play-overlay{display:none;}
.thumb-wrap.playing iframe{display:block;}

/* video info */
.video-info{padding:0.55rem 0.7rem 0.65rem;}

.video-title{
  font-size:12px;font-weight:500;
  color:var(--text);line-height:1.35;
  display:-webkit-box;-webkit-line-clamp:2;
  -webkit-box-orient:vertical;overflow:hidden;
  margin-bottom:0.2rem;
}

.video-meta{
  font-family:'DM Mono',monospace;
  font-size:10px;color:var(--faint);
}

/* ── SKELETON LOADING ── */
.skeleton-row{
  display:grid;grid-template-columns:repeat(5,1fr);
}
@media(max-width:960px){.skeleton-row{grid-template-columns:repeat(3,1fr);}}
@media(max-width:560px){.skeleton-row{grid-template-columns:repeat(2,1fr);}}

.skeleton-card{border-right:1px solid var(--border);}
.skeleton-card:last-child{border-right:none;}

.skeleton-thumb{padding-bottom:56.25%;height:0;background:var(--surface2);animation:shimmer 1.5s infinite;}
.skeleton-line{height:10px;border-radius:4px;background:var(--surface2);margin:0.55rem 0.7rem 0.3rem;animation:shimmer 1.5s infinite;}
.skeleton-line.short{width:60%;margin-bottom:0.55rem;}

@keyframes shimmer{
  0%{opacity:0.5}50%{opacity:1}100%{opacity:0.5}
}

/* ── ERROR STATE ── */
.channel-error{
  padding:1.2rem;
  font-size:13px;color:var(--faint);font-style:italic;
  text-align:center;
}

/* ── FOOTER ── */
footer{
  border-top:1px solid var(--border);
  padding-top:1.5rem;
  display:flex;justify-content:space-between;align-items:center;
  flex-wrap:wrap;gap:1rem;
}
.footer-info{font-size:12px;color:var(--faint);}
.footer-info strong{color:var(--muted);}

@media(max-width:640px){
  .wrap{padding:0 1rem 3rem;}
  header{flex-direction:column;}
  .header-right{align-items:flex-start;}
}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div>
      <div class="brand-name">Daily <em>Brief</em></div>
      <div class="brand-sub">Latest videos from your favourite channels — refreshed on every visit</div>
    </div>
    <div class="header-right">
      <div class="date-badge" id="today-date">—</div>
      <button class="btn-refresh" onclick="loadAll()">↺ Refresh</button>
    </div>
  </header>

  <div id="channels-root"></div>

  <footer>
    <div class="footer-info"><strong id="footer-time">—</strong> &nbsp;·&nbsp; YouTube RSS · No API key</div>
  </footer>

</div>
<script>
/* ══════════════════════════════════════════
   CONFIG — add/remove channels here
══════════════════════════════════════════ */
const CHANNELS = [
  {name:'The Deshbhakt',  handle:'thedeshbhakt',  id:'UCmTM_hPCeckqN3cPWtYZZcg'},
  {name:'Sunday Sarthak', handle:'SundaySarthak',  id:'UC_hVYmNLOBCToJBl9IJFFNQ'},
  {name:'Mohak Mangal',   handle:'mohak_mangal',   id:'UCz4a7agVFr1TxU-mpAP8hkw'},
  {name:'Abhi and Niyu',  handle:'AbhiandNiyu',    id:'UCsDTy8jvHcwMvSZf_JGi-FA'},
  {name:'Dhruv Rathee',   handle:'dhruvrathee',    id:'UC-CSyyi47VX1lD9zyeABW3w'},
  {name:'Open Letter',    handle:'openletteryt',   id:'UCPJ_UzD4PEC-_vwN32amlIQ'},
];

const VIDEOS_PER_CHANNEL = 5;

/* Multiple CORS proxies tried in order — if one fails, next is used.
   YouTube RSS XML cannot be fetched directly from a browser due to CORS.
   These proxies relay the request server-side and return with CORS headers. */
const PROXIES = [
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
  url => `https://thingproxy.freeboard.io/fetch/${url}`,
];

/* ══════════════════════════════════════════
   UTILITIES
══════════════════════════════════════════ */
const esc = s => String(s||'')
  .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
  .replace(/"/g,'&quot;').replace(/'/g,'&#39;').trim();

function timeAgo(dateStr){
  if(!dateStr) return '';
  const mins = Math.floor((Date.now() - new Date(dateStr)) / 60000);
  if(mins <  1)    return 'Just now';
  if(mins < 60)    return `${mins}m ago`;
  if(mins < 1440)  return `${Math.floor(mins/60)}h ago`;
  if(mins < 10080) return `${Math.floor(mins/1440)}d ago`;
  return new Date(dateStr).toLocaleDateString('en-AU',{day:'numeric',month:'short'});
}

/* ══════════════════════════════════════════
   DATE
══════════════════════════════════════════ */
const now = new Date();
document.getElementById('today-date').textContent =
  now.toLocaleDateString('en-AU',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
document.getElementById('footer-time').textContent =
  'Loaded ' + now.toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'});

/* ══════════════════════════════════════════
   SKELETON — show while loading
══════════════════════════════════════════ */
const YT_SVG = `<svg viewBox="0 0 24 24"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.6 12 3.6 12 3.6s-7.5 0-9.4.5A3 3 0 0 0 .5 6.2C0 8.1 0 12 0 12s0 3.9.5 5.8a3 3 0 0 0 2.1 2.1c1.9.5 9.4.5 9.4.5s7.5 0 9.4-.5a3 3 0 0 0 2.1-2.1C24 15.9 24 12 24 12s0-3.9-.5-5.8zM9.6 15.6V8.4l6.3 3.6-6.3 3.6z"/></svg>`;
const PLAY_SVG = `<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>`;

function skeletonBlock(ch, idx){
  const skCards = Array(VIDEOS_PER_CHANNEL).fill(0).map(()=>`
    <div class="skeleton-card">
      <div class="skeleton-thumb"></div>
      <div class="skeleton-line"></div>
      <div class="skeleton-line short"></div>
    </div>`).join('');
  return `
  <div class="channel-block" id="ch-${idx}" style="animation-delay:${idx*60}ms">
    <div class="channel-hd">
      <span class="yt-icon">${YT_SVG}</span>
      <a class="channel-name" href="https://www.youtube.com/@${ch.handle}" target="_blank" rel="noopener">${esc(ch.name)}</a>
      <span class="channel-count">Loading…</span>
    </div>
    <div class="skeleton-row">${skCards}</div>
  </div>`;
}

/* ══════════════════════════════════════════
   FETCH — one channel
══════════════════════════════════════════ */
/* Parse YouTube Atom XML into video list */
function parseYouTubeXML(xmlText){
  const parser = new DOMParser();
  const doc    = parser.parseFromString(xmlText, 'application/xml');
  const entries = Array.from(doc.querySelectorAll('entry'));
  return entries.slice(0, VIDEOS_PER_CHANNEL).map(e => {
    const videoId = e.querySelector('videoId')?.textContent || '';
    const title   = e.querySelector('title')?.textContent   || '';
    const pubDate = e.querySelector('published')?.textContent || '';
    return { id: videoId, title, pubDate };
  }).filter(v => v.id);
}

/* Try each proxy in order until one works */
async function fetchWithProxies(rssUrl){
  for(let i = 0; i < PROXIES.length; i++){
    const proxyUrl = PROXIES[i](rssUrl);
    try{
      const res = await fetch(proxyUrl, {signal: AbortSignal.timeout(8000)});
      if(!res.ok) continue;
      const text = await res.text();
      // allorigins wraps response in {contents: "..."} 
      let xml = text;
      try{
        const json = JSON.parse(text);
        if(json.contents) xml = json.contents;
      } catch(e){ /* not JSON, use as-is */ }
      if(!xml.includes('<entry>')) continue;
      return xml;
    } catch(e){
      console.warn(`Proxy ${i+1} failed for ${rssUrl}:`, e.message);
    }
  }
  throw new Error('All proxies failed');
}

async function fetchChannel(ch, idx){
  const rssUrl = `https://www.youtube.com/feeds/videos.xml?channel_id=${ch.id}`;
  try{
    const xml    = await fetchWithProxies(rssUrl);
    const videos = parseYouTubeXML(xml);
    if(!videos.length) throw new Error('No videos parsed');
    renderChannel(ch, idx, videos);
  } catch(e){
    renderError(ch, idx, e.message);
  }
}

/* ══════════════════════════════════════════
   RENDER — channel with videos
══════════════════════════════════════════ */
function renderChannel(ch, idx, videos){
  const block = document.getElementById(`ch-${idx}`);
  if(!block) return;

  const videoCards = videos.map((v, vi) => {
    const thumb    = `https://i.ytimg.com/vi/${v.id}/mqdefault.jpg`;
    const embedSrc = `https://www.youtube-nocookie.com/embed/${v.id}?rel=0&modestbranding=1&iv_load_policy=3&autoplay=1`;
    const ago      = timeAgo(v.pubDate);
    return `
    <div class="video-card" data-idx="${vi}">
      <div class="thumb-wrap" id="tw-${idx}-${vi}">
        <img class="thumb-img" src="${thumb}" alt="${esc(v.title)}" loading="lazy"/>
        <div class="play-overlay">${PLAY_SVG}</div>
        <iframe src="" data-src="${embedSrc}"
          title="${esc(v.title)}"
          allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture"
          allowfullscreen></iframe>
      </div>
      <div class="video-info">
        <div class="video-title">${esc(v.title)}</div>
        ${ago ? `<div class="video-meta">${ago}</div>` : ''}
      </div>
    </div>`;
  }).join('');

  block.innerHTML = `
    <div class="channel-hd">
      <span class="yt-icon">${YT_SVG}</span>
      <a class="channel-name" href="https://www.youtube.com/@${ch.handle}" target="_blank" rel="noopener">${esc(ch.name)}</a>
      <span class="channel-count">${videos.length} VIDEOS</span>
    </div>
    <div class="videos-row">${videoCards}</div>`;

  // attach click-to-play on each thumbnail
  videos.forEach((v, vi) => {
    const wrap   = document.getElementById(`tw-${idx}-${vi}`);
    const iframe = wrap?.querySelector('iframe');
    if(!wrap || !iframe) return;
    wrap.addEventListener('click', () => {
      if(wrap.classList.contains('playing')) return;
      // pause siblings in same channel
      block.querySelectorAll('.thumb-wrap.playing').forEach(w => {
        w.querySelector('iframe').src = '';
        w.classList.remove('playing');
      });
      iframe.src = iframe.dataset.src;
      wrap.classList.add('playing');
    });
  });
}

/* ══════════════════════════════════════════
   RENDER — error state
══════════════════════════════════════════ */
function renderError(ch, idx, msg){
  const block = document.getElementById(`ch-${idx}`);
  if(!block) return;
  block.innerHTML = `
    <div class="channel-hd">
      <span class="yt-icon">${YT_SVG}</span>
      <a class="channel-name" href="https://www.youtube.com/@${ch.handle}" target="_blank" rel="noopener">${esc(ch.name)}</a>
      <span class="channel-count" style="color:var(--yt)">Error</span>
    </div>
    <div class="channel-error">
      Could not load videos — <a href="https://www.youtube.com/@${ch.handle}/videos" target="_blank" rel="noopener" style="color:var(--yt)">open channel on YouTube →</a>
    </div>`;
}

/* ══════════════════════════════════════════
   LOAD ALL
══════════════════════════════════════════ */
function loadAll(){
  const root = document.getElementById('channels-root');

  // render skeletons first
  root.innerHTML = CHANNELS.map((ch, i) => skeletonBlock(ch, i)).join('');

  // update footer time
  const t = new Date();
  document.getElementById('footer-time').textContent =
    'Loaded ' + t.toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'});

  // fetch all channels in parallel
  CHANNELS.forEach((ch, i) => fetchChannel(ch, i));
}

// kick off on page load
loadAll();
</script>
</body>
</html>
