<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Daily Brief</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}

:root{
  --bg:#0c0e14;
  --surface:#13161f;
  --surface2:#1b1f2d;
  --border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.14);
  --text:#e8eaf0;
  --muted:#7c8399;
  --faint:#3d4360;
  --intl:#4f7cff;
  --aus:#00c9a7;
  --ind:#ff7c4f;
  --yt:#ff4444;
  --radius:14px;
  --radius-sm:8px;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  font-size:15px;
  line-height:1.6;
  min-height:100vh;
}

body::before{
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 80% 50% at 15% -5%,rgba(79,124,255,0.06) 0%,transparent 60%),
    radial-gradient(ellipse 60% 40% at 85% 105%,rgba(0,201,167,0.04) 0%,transparent 60%);
  pointer-events:none;z-index:0;
}

.wrap{
  max-width:1160px;
  margin:0 auto;
  padding:0 2rem 5rem;
  position:relative;z-index:1;
}

/* ── HEADER ── */
header{
  padding:2.5rem 0 2rem;
  margin-bottom:3rem;
  border-bottom:1px solid var(--border);
}
.header-top{
  display:flex;align-items:flex-start;
  justify-content:space-between;flex-wrap:wrap;gap:1rem;
}
.brand-name{
  font-family:'DM Serif Display',serif;
  font-size:clamp(1.9rem,3.5vw,2.8rem);
  font-weight:400;letter-spacing:-0.02em;line-height:1;
}
.brand-name em{
  font-style:italic;
  background:linear-gradient(135deg,var(--intl),var(--aus));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.brand-sub{font-size:13px;color:var(--muted);margin-top:0.3rem}
.header-meta{display:flex;flex-direction:column;align-items:flex-end;gap:0.5rem}
.date-badge{
  font-family:'DM Mono',monospace;font-size:11px;font-weight:500;
  letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);
  background:var(--surface);border:1px solid var(--border);
  padding:5px 12px;border-radius:20px;
}
.pills{display:flex;gap:0.4rem;flex-wrap:wrap}
.pill{
  font-size:10px;font-weight:600;letter-spacing:0.09em;text-transform:uppercase;
  padding:3px 10px;border-radius:20px;border:1px solid;
}
.p-intl{color:var(--intl);border-color:rgba(79,124,255,0.3);background:rgba(79,124,255,0.08)}
.p-aus {color:var(--aus); border-color:rgba(0,201,167,0.3); background:rgba(0,201,167,0.08)}
.p-ind {color:var(--ind); border-color:rgba(255,124,79,0.3); background:rgba(255,124,79,0.08)}
.p-yt  {color:var(--yt);  border-color:rgba(255,68,68,0.3);  background:rgba(255,68,68,0.08)}

/* ── SECTION HEADER ── */
.sec-hd{
  display:flex;align-items:center;gap:10px;
  margin-bottom:1.5rem;padding-bottom:0.75rem;
  border-bottom:1px solid var(--border);
}
.sec-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.d-intl{background:var(--intl);box-shadow:0 0 8px rgba(79,124,255,0.5)}
.d-aus {background:var(--aus); box-shadow:0 0 8px rgba(0,201,167,0.5)}
.d-ind {background:var(--ind); box-shadow:0 0 8px rgba(255,124,79,0.5)}
.d-yt  {background:var(--yt);  box-shadow:0 0 8px rgba(255,68,68,0.5)}
.sec-title{
  font-family:'DM Serif Display',serif;font-size:1.35rem;
  font-weight:400;letter-spacing:-0.01em;
}
.sec-count{
  margin-left:auto;font-family:'DM Mono',monospace;
  font-size:11px;color:var(--faint);letter-spacing:0.08em;
}

/* ── NEWS SECTION ── */
.news-section{margin-bottom:3.5rem}

.news-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(310px,1fr));
  gap:1.25rem;
}

/* ── NEWS CARD ── */
.news-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:1.4rem;
  transition:border-color 0.2s,transform 0.18s,box-shadow 0.2s;
  animation:fadeUp 0.4s ease both;
  position:relative;overflow:hidden;
  display:flex;flex-direction:column;
}
.news-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  border-radius:var(--radius) var(--radius) 0 0;opacity:0;
  transition:opacity 0.2s;
}
.news-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,0.3)}
.news-card:hover::before{opacity:1}
.c-intl::before{background:linear-gradient(90deg,var(--intl),transparent)}
.c-aus::before {background:linear-gradient(90deg,var(--aus),transparent)}
.c-ind::before {background:linear-gradient(90deg,var(--ind),transparent)}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.card-src{
  font-family:'DM Mono',monospace;font-size:10px;font-weight:500;
  letter-spacing:0.1em;text-transform:uppercase;margin-bottom:0.55rem;
}
.s-intl{color:var(--intl)} .s-aus{color:var(--aus)} .s-ind{color:var(--ind)}

.card-title{
  font-family:'DM Serif Display',serif;font-size:1.05rem;line-height:1.35;
  color:var(--text);margin-bottom:0.75rem;font-weight:400;
}

/* Full summary — no clamp, full display */
.card-body{
  font-size:13.5px;color:var(--muted);line-height:1.72;font-weight:300;
  flex:1;
}

/* ── SECTION DIVIDER ── */
.divider{height:1px;background:linear-gradient(90deg,transparent,var(--border2),transparent);margin:0 0 3.5rem}

/* ── YOUTUBE SECTION ── */
.yt-section{margin-bottom:3.5rem}
.yt-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:1.25rem;
}
.yt-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;
  transition:border-color 0.2s,transform 0.18s,box-shadow 0.2s;
  animation:fadeUp 0.4s ease both;
}
.yt-card:hover{border-color:rgba(255,68,68,0.3);transform:translateY(-2px);box-shadow:0 8px 30px rgba(255,68,68,0.08)}

.yt-thumb-wrap{
  position:relative;padding-bottom:56.25%;height:0;background:#000;
  cursor:pointer;
}
.yt-thumb-wrap img{
  position:absolute;top:0;left:0;width:100%;height:100%;
  object-fit:cover;display:block;
}
.yt-play-btn{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:56px;height:56px;background:rgba(255,0,0,0.9);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  transition:background 0.15s,transform 0.15s;pointer-events:none;
}
.yt-thumb-wrap:hover .yt-play-btn{background:rgba(255,0,0,1);transform:translate(-50%,-50%) scale(1.1)}
.yt-play-btn svg{width:22px;height:22px;fill:#fff;margin-left:3px}

/* iframe replaces thumbnail on click */
.yt-thumb-wrap iframe{
  position:absolute;top:0;left:0;width:100%;height:100%;border:none;display:none;
}
.yt-thumb-wrap.playing img,
.yt-thumb-wrap.playing .yt-play-btn{display:none}
.yt-thumb-wrap.playing iframe{display:block}

.yt-body{padding:1rem 1.15rem 1.1rem}
.yt-channel{
  font-family:'DM Mono',monospace;font-size:10px;font-weight:500;
  letter-spacing:0.1em;text-transform:uppercase;color:var(--yt);
  margin-bottom:0.3rem;display:flex;align-items:center;gap:5px;
}
.yt-channel svg{width:11px;height:11px;fill:var(--yt)}
.yt-title{font-size:13.5px;font-weight:500;color:var(--text);line-height:1.4;min-height:1.4em}
.yt-loading{color:var(--faint);font-size:12px;font-style:italic}

/* ── LOADING / ERROR ── */
.state-box{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:3rem 2rem;text-align:center;color:var(--muted);
}
.spinner{
  width:26px;height:26px;border:2px solid var(--border2);
  border-top-color:var(--intl);border-radius:50%;
  animation:spin 0.7s linear infinite;margin:0 auto 1rem;
}
@keyframes spin{to{transform:rotate(360deg)}}
.state-label{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.12em;text-transform:uppercase}

/* ── FOOTER ── */
footer{
  border-top:1px solid var(--border);padding-top:1.5rem;
  display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;
}
.footer-info{font-size:12px;color:var(--faint)}
.footer-info strong{color:var(--muted)}
.btn-reload{
  font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;
  letter-spacing:0.07em;text-transform:uppercase;padding:7px 16px;
  background:transparent;color:var(--text);border:1px solid var(--border2);
  border-radius:var(--radius-sm);cursor:pointer;transition:background 0.15s,border-color 0.15s;
}
.btn-reload:hover{background:var(--surface2);border-color:var(--intl)}

@media(max-width:640px){
  .wrap{padding:0 1rem 3rem}
  .header-top{flex-direction:column}
  .header-meta{align-items:flex-start}
  .news-grid,.yt-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="wrap">

  <!-- HEADER -->
  <header>
    <div class="header-top">
      <div class="brand">
        <div class="brand-name">Daily <em>Brief</em></div>
        <div class="brand-sub">Your curated digest — auto-updated by GitHub Actions</div>
      </div>
      <div class="header-meta">
        <div class="date-badge" id="today-date">—</div>
        <div class="pills">
          <span class="pill p-intl">🌍 World</span>
          <span class="pill p-aus">🇦🇺 Australia</span>
          <span class="pill p-ind">🇮🇳 India</span>
          <span class="pill p-yt">▶ YouTube</span>
        </div>
      </div>
    </div>
  </header>

  <!-- NEWS (rendered by JS) -->
  <div id="news-root">
    <div class="state-box">
      <div class="spinner"></div>
      <div class="state-label">Loading news.json…</div>
    </div>
  </div>

  <!-- YOUTUBE -->
  <div class="divider"></div>
  <div class="yt-section">
    <div class="sec-hd">
      <span class="sec-dot d-yt"></span>
      <span class="sec-title">Latest from YouTube</span>
      <span class="sec-count">6 CHANNELS</span>
    </div>
    <div class="yt-grid" id="yt-grid">
      <!-- skeleton cards -->
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <div class="footer-info"><strong id="footer-time">—</strong> &nbsp;·&nbsp; GitHub Actions · news.json</div>
    <button class="btn-reload" onclick="location.reload()">↺ Reload</button>
  </footer>

</div>

<script>
/* ═══════════════════════════════════════
   UTILITIES
═══════════════════════════════════════ */
const esc = s => String(s||'')
  .replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>')
  .replace(/&quot;/g,'"').replace(/&#39;/g,"'").trim();

function cleanSummary(raw){
  const text = Array.isArray(raw) ? raw.join(' ') : String(raw||'');
  return text
    .replace(/Summarize this news article:\s*/gi,'')
    // fix common Windows-1252 / UTF-8 mojibake
    .replace(/â€™/g,"'").replace(/â€œ/g,'"').replace(/â€/g,'"')
    .replace(/â€˜/g,"'").replace(/â/g,'').replace(/€/g,'').replace(/™/g,"'")
    // strip leftover noise words artifact from bad AI summary ("only only only…")
    .replace(/\b(only|both|their|our|had|one|over|well|still)\s+(?:\1\s*){3,}/gi,' ')
    .replace(/\s{2,}/g,' ').trim();
}

/* ═══════════════════════════════════════
   DATE
═══════════════════════════════════════ */
const now = new Date();
document.getElementById('today-date').textContent =
  now.toLocaleDateString('en-AU',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
document.getElementById('footer-time').textContent =
  'Loaded '+now.toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'});

/* ═══════════════════════════════════════
   NEWS — reads news.json from same folder
═══════════════════════════════════════ */
const SECTIONS = [
  {key:'international', label:'International', dot:'d-intl', card:'c-intl', src:'s-intl', n:'3 STORIES'},
  {key:'australia',     label:'Australia',     dot:'d-aus',  card:'c-aus',  src:'s-aus',  n:'3 STORIES'},
  {key:'india',         label:'India',         dot:'d-ind',  card:'c-ind',  src:'s-ind',  n:'4 STORIES'},
];

async function loadNews(){
  const root = document.getElementById('news-root');
  try{
    const r = await fetch('./news.json?_='+Date.now());
    if(!r.ok) throw new Error('HTTP '+r.status);
    const data = await r.json();
    let html = '';
    SECTIONS.forEach(sec=>{
      const items = (data[sec.key]||[]);
      const cards = items.map((item,i)=>{
        const title   = esc(item.title || item.headline || 'Untitled');
        const source  = esc(item.source || '');
        const summary = cleanSummary(item.summary || item.description || '');
        return `
        <div class="news-card ${sec.card}" style="animation-delay:${i*80}ms">
          ${source ? `<div class="card-src ${sec.src}">${source}</div>` : ''}
          <div class="card-title">${title}</div>
          ${summary ? `<div class="card-body">${summary}</div>` : ''}
        </div>`;
      }).join('');
      html += `
      <div class="news-section">
        <div class="sec-hd">
          <span class="sec-dot ${sec.dot}"></span>
          <span class="sec-title">${sec.label}</span>
          <span class="sec-count">${sec.n}</span>
        </div>
        <div class="news-grid">${cards||'<div class="state-box"><div class="state-label">No items</div></div>'}</div>
      </div>
      <div class="divider"></div>`;
    });
    root.innerHTML = html;
  } catch(e){
    root.innerHTML = `
    <div class="state-box">
      <div class="state-label" style="color:#ff6b6b">Failed to load news.json</div>
      <p style="margin-top:0.75rem;font-size:13px;color:var(--faint)">
        Make sure <strong>news.json</strong> is in the same folder as this file.<br>
        ${e.message}
      </p>
    </div>`;
  }
}

loadNews();

/* ═══════════════════════════════════════
   YOUTUBE — fetch latest video via RSS
   Uses rss2json.com (free, no key needed,
   works from hosted pages / GitHub Pages)
═══════════════════════════════════════ */
const CHANNELS = [
  {id:'UCmTM_hPCeckqN3cPWtYZZcg', name:'The Deshbhakt'},
  {id:'UC5fcjujOsqD-126Chn_BAuA',  name:'Sunday Sarthak'},   // Sarthak Goswami main channel
  {id:'UCz4a7agVFr1TxU-mpAP8hkw', name:'Mohak Mangal'},
  {id:'UCsDTy8jvHcwMvSZf_JGi-FA', name:'Abhi and Niyu'},
  {id:'UC4rlAVgAK0SGk-yTfe48Qpw', name:'Dhruv Rathee'},
  {id:'UCPJ_UzD4PEC-_vwN32amlIQ', name:'Open Letter'},
];

// Build skeleton cards first so layout doesn't jump
const grid = document.getElementById('yt-grid');
grid.innerHTML = CHANNELS.map((ch,i)=>`
  <div class="yt-card" id="ytcard-${i}" style="animation-delay:${i*100}ms">
    <div class="yt-thumb-wrap" id="ytthumb-${i}" style="padding-bottom:56.25%;background:var(--surface2)"></div>
    <div class="yt-body">
      <div class="yt-channel">
        <svg viewBox="0 0 24 24"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.6 12 3.6 12 3.6s-7.5 0-9.4.5A3 3 0 0 0 .5 6.2C0 8.1 0 12 0 12s0 3.9.5 5.8a3 3 0 0 0 2.1 2.1c1.9.5 9.4.5 9.4.5s7.5 0 9.4-.5a3 3 0 0 0 2.1-2.1C24 15.9 24 12 24 12s0-3.9-.5-5.8zM9.6 15.6V8.4l6.3 3.6-6.3 3.6z"/></svg>
        ${ch.name}
      </div>
      <div class="yt-title yt-loading" id="yttitle-${i}">Loading latest video…</div>
    </div>
  </div>`).join('');

async function fetchLatestVideo(ch, idx){
  const rssUrl = `https://www.youtube.com/feeds/videos.xml?channel_id=${ch.id}`;
  const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}&count=1`;

  try{
    const r = await fetch(apiUrl);
    if(!r.ok) throw new Error('HTTP '+r.status);
    const data = await r.json();
    if(data.status !== 'ok' || !data.items?.length) throw new Error('no items');

    const item = data.items[0];
    // Extract video ID from link like https://www.youtube.com/watch?v=VIDEOID
    const match = (item.link||'').match(/[?&]v=([A-Za-z0-9_-]{11})/);
    if(!match) throw new Error('no video ID');

    const videoId = match[1];
    const title   = esc(item.title || 'Latest video');
    const thumb   = `https://i.ytimg.com/vi/${videoId}/hqdefault.jpg`;
    // nocookie + rel=0 = no recommendations after video ends
    const embedUrl = `https://www.youtube-nocookie.com/embed/${videoId}?rel=0&modestbranding=1&iv_load_policy=3&autoplay=1`;

    const thumbWrap = document.getElementById(`ytthumb-${idx}`);
    thumbWrap.innerHTML = `
      <img src="${thumb}" alt="${title}" loading="lazy"/>
      <div class="yt-play-btn">
        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </div>
      <iframe src="" data-src="${embedUrl}" title="${title}" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowfullscreen></iframe>`;

    // Click thumbnail → load iframe (lazy — avoids autoload of 6 iframes)
    thumbWrap.style.cursor='pointer';
    thumbWrap.addEventListener('click',()=>{
      if(thumbWrap.classList.contains('playing')) return;
      const iframe = thumbWrap.querySelector('iframe');
      iframe.src = iframe.dataset.src;
      thumbWrap.classList.add('playing');
    },{once:true});

    document.getElementById(`yttitle-${idx}`).textContent = title;
    document.getElementById(`yttitle-${idx}`).classList.remove('yt-loading');

  } catch(e){
    // Fallback: direct channel link button
    const thumbWrap = document.getElementById(`ytthumb-${idx}`);
    thumbWrap.style.cssText += 'display:flex;align-items:center;justify-content:center;min-height:158px';
    thumbWrap.innerHTML = `<a href="https://www.youtube.com/channel/${ch.id}/videos" target="_blank" rel="noopener"
      style="color:var(--yt);font-size:13px;text-decoration:none;text-align:center;padding:1rem">
      ▶ Open ${ch.name}<br>on YouTube →
    </a>`;
    document.getElementById(`yttitle-${idx}`).textContent = 'Click to visit channel';
    document.getElementById(`yttitle-${idx}`).classList.remove('yt-loading');
  }
}

// Fetch all channels in parallel
CHANNELS.forEach((ch,i) => fetchLatestVideo(ch, i));
</script>
</body>
</html>
